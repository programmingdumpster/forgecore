<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCore | Roblox Modules</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #0078d4;
            --text-main: #ffffff;
            --text-dim: #777777;
            --border: #151515;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.4;
            letter-spacing: -0.02em;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 8%;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .currency-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-dim);
            padding-right: 20px;
            border-right: 1px solid var(--border);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px; width: 12px;
            left: 3px; bottom: 3px;
            background-color: var(--text-main);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }

        .currency-label.active { color: var(--text-main); }

        .discord-link {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            font-family: var(--font-mono);
            transition: 0.2s;
            border: 1px solid var(--border);
            padding: 8px 15px;
        }

        .discord-link:hover { 
            color: var(--text-main); 
            border-color: var(--accent);
            background: #5865F2; /* Discord color */
        }

        .hero { padding: 100px 8% 60px; }
        .hero h1 { font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .hero p { font-size: 1.2rem; color: var(--text-dim); max-width: 600px; margin-bottom: 10px; }

        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            border-top: 1px solid var(--border);
            background-color: var(--border);
            gap: 1px;
        }

        .module-card { background-color: var(--bg); padding: 40px; display: flex; flex-direction: column; }
        .preview-box { width: 100%; aspect-ratio: 16 / 9; background-color: #080808; border: 1px solid var(--border); margin-bottom: 25px; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .category { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
        .module-card h3 { font-size: 1.8rem; font-weight: 800; margin-bottom: 15px; }
        .module-card p { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 20px; }

        .features { list-style: none; margin-bottom: 30px; flex-grow: 1; }
        .features li { font-size: 0.85rem; color: #888; margin-bottom: 5px; padding-left: 15px; position: relative; }
        .features li::before { content: "→"; position: absolute; left: 0; color: var(--accent); }

        .card-action { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid var(--border); }
        .price { font-size: 1.5rem; font-weight: 900; font-family: var(--font-mono); }
        .price span { font-size: 0.9rem; color: var(--text-dim); margin-left: 5px; }

        .btn-store { padding: 12px 25px; background: var(--text-main); color: var(--bg); text-decoration: none; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; transition: 0.2s; }
        .btn-store:hover { background: var(--accent); color: white; }

        footer { padding: 60px 8%; border-top: 1px solid var(--border); color: var(--text-dim); font-family: var(--font-mono); font-size: 0.7rem; }

        @media (max-width: 768px) { #product-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo">FORGECORE</div>
    <nav>
        <div class="currency-switch">
            <span id="label-robux" class="currency-label active">R$</span>
            <label class="switch">
                <input type="checkbox" id="currency-toggle">
                <span class="slider"></span>
            </label>
            <span id="label-usd" class="currency-label">USD</span>
        </div>
        <a href="https://discord.gg/SDv5hp6f" class="discord-link" target="_blank">Discord Server</a>
    </nav>
</header>

<section class="hero">
    <h1>Development Store</h1>
    <p>Modular scripts and systems for Roblox developers.</p>
    <p>DM <strong>programmingdumpster</strong> for support or custom commissions.</p>
</section>

<div id="product-grid"></div>

<footer>
    <p>// FORGECORE.LUA | PROFESSIONAL ASSETS</p>
</footer>

<script>
    const productFiles = ['products/forgedss-v2.json'];
    const DISCORD_URL = "https://discord.gg/SDv5hp6f";
    let productsData = [];
    let showUSD = false;

    async function loadProducts() {
        const grid = document.getElementById('product-grid');
        productsData = [];
        
        for (const file of productFiles) {
            try {
                const response = await fetch(file);
                const data = await response.json();
                productsData.push(data);
            } catch (error) {
                console.error('Error loading product:', file, error);
            }
        }
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        
        productsData.forEach(data => {
            const card = document.createElement('div');
            card.className = 'module-card';
            
            const specs = data.technical_specs || [];
            const featuresHtml = specs.map(f => `<li>${f}</li>`).join('');
            
            const displayPrice = showUSD ? `$${data.price_usd}` : `${data.price_robux}`;
            const displaySymbol = showUSD ? 'USD' : 'R$';
            
            // Logika linku: USD -> Store, Robux -> Discord
            const finalUrl = showUSD ? data.url : DISCORD_URL;
            const buttonText = showUSD ? "Creator Store" : "Buy via Discord";

            card.innerHTML = `
                <div class="preview-box">
                    <img src="${data.image}" alt="${data.name}">
                </div>
                <span class="category">${data.category}</span>
                <h3>${data.name}</h3>
                <p>${data.description}</p>
                <ul class="features">${featuresHtml}</ul>
                <div class="card-action">
                    <div class="price">${displayPrice} <span>${displaySymbol}</span></div>
                    <a href="${finalUrl}" class="btn-store" target="_blank">${buttonText}</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    document.getElementById('currency-toggle').addEventListener('change', (e) => {
        showUSD = e.target.checked;
        document.getElementById('label-robux').classList.toggle('active', !showUSD);
        document.getElementById('label-usd').classList.toggle('active', showUSD);
        renderProducts();
    });

    window.addEventListener('DOMContentLoaded', loadProducts);
</script>

</body>
</html>
