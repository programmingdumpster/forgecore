<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCore | Roblox Modules</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #0078d4;
            --text-main: #ffffff;
            --text-dim: #777777;
            --border: #151515;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.4;
            letter-spacing: -0.02em;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 8%;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 40px;
            text-transform: uppercase;
            font-family: var(--font-mono);
            transition: 0.2s;
        }

        nav a:hover { color: var(--text-main); }

        .hero {
            padding: 100px 8% 60px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 600px;
        }

        /* Module Grid */
        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            border-top: 1px solid var(--border);
            background-color: var(--border);
            gap: 1px;
        }

        .module-card {
            background-color: var(--bg);
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #080808;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .category {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .module-card h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .module-card p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .features {
            list-style: none;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .features li {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
            padding-left: 15px;
            position: relative;
        }

        .features li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        .card-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .price {
            font-size: 1.5rem;
            font-weight: 900;
            font-family: var(--font-mono);
        }

        .btn-store {
            padding: 12px 25px;
            background: var(--text-main);
            color: var(--bg);
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .btn-store:hover { background: var(--accent); color: white; }

        footer {
            padding: 60px 8%;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.7rem;
        }

        @media (max-width: 768px) {
            #product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">FORGECORE</div>
    <nav>
        <a href="#assets">Modules</a>
        <a href="https://discord.gg/invite">Discord</a>
    </nav>
</header>

<section class="hero">
    <h1>Development Store</h1>
    <p>Modular scripts and systems for Roblox developers.</p>
</section>

<div id="product-grid">
    </div>

<footer>
    <p>// FORGECORE.LUA | PROFESSIONAL ASSETS</p>
</footer>

<script>
    // List your JSON filenames here
    const productFiles = [
        'products/forgedss-v2.json',
    ];

    async function loadProducts() {
        const grid = document.getElementById('product-grid');
        
        for (const file of productFiles) {
            try {
                const response = await fetch(file);
                const data = await response.json();
                
                const card = document.createElement('div');
                card.className = 'module-card';
                
                const featuresHtml = data.features.map(f => `<li>${f}</li>`).join('');

                card.innerHTML = `
                    <div class="preview-box">
                        <img src="${data.image}" alt="${data.name}">
                    </div>
                    <span class="category">${data.category}</span>
                    <h3>${data.name}</h3>
                    <p>${data.description}</p>
                    <ul class="features">${featuresHtml}</ul>
                    <div class="card-action">
                        <div class="price">${data.price} <span>R$</span></div>
                        <a href="${data.link}" class="btn-store" target="_blank">Creator Store</a>
                    </div>
                `;
                
                grid.appendChild(card);
            } catch (error) {
                console.error('Error loading product:', file, error);
            }
        }
    }

    window.addEventListener('DOMContentLoaded', loadProducts);
</script>

</body>
</html>
